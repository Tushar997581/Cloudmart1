version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cloudmart_secure_password
      POSTGRES_DB: cloudmart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:cloudmart_secure_password@db:5432/cloudmart?schema=public
      - JWT_SECRET=super_secret_jwt_key_prod_2026
      - AWS_REGION=us-east-1
      - AWS_S3_BUCKET=cloudmart-assets
    depends_on:
      db:
        condition: service_healthy
    restart: always

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: always

volumes:
  pgdata: